<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Tetrahedral atom: 1 central A + 4 tetrahedral neighbours + 4 bonds -->
  <line x1="16" y1="16" x2="4" y2="4"  stroke="#d97236" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="28" y2="4"  stroke="#d97236" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="4" y2="28" stroke="#d97236" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="28" y2="28" stroke="#d97236" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="4"  cy="4"  r="3" fill="#2a5f8f"/>
  <circle cx="28" cy="4"  r="3" fill="#2a5f8f"/>
  <circle cx="4"  cy="28" r="3" fill="#2a5f8f"/>
  <circle cx="28" cy="28" r="3" fill="#2a5f8f"/>
  <circle cx="16" cy="16" r="5" fill="#d97236"/>
</svg>
